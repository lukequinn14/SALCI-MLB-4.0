name: SALCI Stage 1 — Daily Base (Nightly)

# ─────────────────────────────────────────────────────────────────────────────
# Runs nightly at 7 AM UTC = 2-3 AM ET (before any MLB game day activity).
# Fetches probable starters + computes Statcast-based SALCI scores.
# Writes: data/daily/YYYY-MM-DD_base.json
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # 7:00 AM UTC = 3:00 AM EDT / 2:00 AM EST
    - cron: "0 7 * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      target_date:
        description: "Override date (YYYY-MM-DD) — leave blank for today"
        required: false
        default: ""

jobs:
  build-base:
    name: Compute Stage 1 Base
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write   # needed to commit + push JSON files

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN || github.token }}

      # ── Python setup ────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── Install dependencies ─────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            requests \
            scipy \
            numpy \
            pandas \
            pybaseball \
            || true   # pybaseball may fail on some runners — script handles gracefully
          # Install any extra project requirements
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ── Run Stage 1 ──────────────────────────────────────────────────────────
      - name: Generate daily_base.json
        env:
          GH_REPO: ${{ github.repository }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
          # Pybaseball cache dir — keep between runs for speed
          PYBASEBALL_CACHE: ${{ github.workspace }}/.pybaseball_cache
        run: |
          mkdir -p data/daily
          python scripts/generate_daily_base.py

      # ── Verify output ────────────────────────────────────────────────────────
      - name: Verify output file
        run: |
          DATE="${{ github.event.inputs.target_date }}"
          if [ -z "$DATE" ]; then DATE=$(date -u +%Y-%m-%d); fi
          FILE="data/daily/${DATE}_base.json"
          if [ -f "$FILE" ]; then
            echo "✅ $FILE written successfully"
            python -c "
          import json, sys
          with open('$FILE') as f: d=json.load(f)
          n = len(d.get('pitchers', []))
          print(f'Pitchers: {n}')
          print('Metadata:', d.get('metadata',{}))
          sys.exit(0 if n > 0 else 1)
          "
          else
            echo "❌ $FILE not found!"
            exit 1
          fi

      # ── Commit + push ────────────────────────────────────────────────────────
      - name: Commit and push base JSON
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "SALCI Actions Bot"
          git add data/daily/
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit (file may already be up to date)."
          else
            DATE="${{ github.event.inputs.target_date }}"
            if [ -z "$DATE" ]; then DATE=$(date -u +%Y-%m-%d); fi
            git commit -m "chore: SALCI Stage 1 base — ${DATE} [skip ci]"
            git push
          fi

      # ── Trigger Stage 2 immediately after base is ready ──────────────────────
      - name: Trigger Stage 2 (Day-of Final)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'stage2_daily_final.yml',
              ref: 'main',
              inputs: {
                target_date: '${{ github.event.inputs.target_date }}'
              }
            });
            console.log('Stage 2 workflow triggered.');
