name: SALCI Stage 2 — Daily Final (Day-of)

# ─────────────────────────────────────────────────────────────────────────────
# Runs every 20 minutes from 3:00 PM UTC to 1:00 AM UTC+1
# = 11 AM – 9 PM EDT (covers lineup drop + first pitch windows).
#
# Each run is idempotent — quality improves as more lineups are confirmed.
# Writes: data/daily/YYYY-MM-DD_final.json
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Every 20 minutes, 15:00–01:00 UTC
    # GitHub Actions cron minimum interval is 5 min; 20 min = */20
    - cron: "0,20,40 15,16,17,18,19,20,21,22,23,0 * * *"

  # Manual trigger (also called by Stage 1 on completion)
  workflow_dispatch:
    inputs:
      target_date:
        description: "Override date (YYYY-MM-DD) — leave blank for today"
        required: false
        default: ""

  # Called by Stage 1 workflow
  workflow_call:
    inputs:
      target_date:
        type: string
        required: false
        default: ""

jobs:
  build-final:
    name: Compute Stage 2 Final
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN || github.token }}
          # Pull latest (Stage 1 may have pushed base.json after our checkout)
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull --rebase origin main

      # ── Python setup ────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── Install dependencies ─────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests scipy numpy pandas pybaseball || true
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ── Check base file exists ────────────────────────────────────────────────
      - name: Check Stage 1 base file exists
        id: check_base
        run: |
          DATE="${{ inputs.target_date || github.event.inputs.target_date }}"
          if [ -z "$DATE" ]; then DATE=$(date -u +%Y-%m-%d); fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          FILE="data/daily/${DATE}_base.json"
          if [ -f "$FILE" ]; then
            echo "base_exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ Base file found: $FILE"
          else
            echo "base_exists=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Base file not found: $FILE — Stage 2 will skip."
          fi

      # ── Run Stage 2 ──────────────────────────────────────────────────────────
      - name: Generate daily_final.json
        if: steps.check_base.outputs.base_exists == 'true'
        env:
          GH_REPO: ${{ github.repository }}
          TARGET_DATE: ${{ steps.check_base.outputs.date }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PYBASEBALL_CACHE: ${{ github.workspace }}/.pybaseball_cache
        run: |
          mkdir -p data/daily
          python scripts/generate_daily_final.py

      # ── Verify output ────────────────────────────────────────────────────────
      - name: Verify output file
        if: steps.check_base.outputs.base_exists == 'true'
        run: |
          DATE="${{ steps.check_base.outputs.date }}"
          FILE="data/daily/${DATE}_final.json"
          if [ -f "$FILE" ]; then
            echo "✅ $FILE written successfully"
            python -c "
          import json
          with open('$FILE') as f: d=json.load(f)
          pitchers = d.get('pitchers', [])
          confirmed = sum(1 for p in pitchers if p.get('lineup_confirmed'))
          print(f'Pitchers: {len(pitchers)} | Confirmed lineups: {confirmed}')
          meta = d.get('metadata', {})
          print('Generated at:', meta.get('generated_at', '?'))
          "
          else
            echo "❌ $FILE not found!"
            exit 1
          fi

      # ── Commit + push ────────────────────────────────────────────────────────
      - name: Commit and push final JSON
        if: steps.check_base.outputs.base_exists == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "SALCI Actions Bot"
          git add data/daily/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            DATE="${{ steps.check_base.outputs.date }}"
            git commit -m "chore: SALCI Stage 2 final — ${DATE} [skip ci]"
            git push
          fi

      # ── Summarise ────────────────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          DATE="${{ steps.check_base.outputs.date }}"
          echo "## SALCI Stage 2 Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "Date: \`$DATE\`" >> "$GITHUB_STEP_SUMMARY"
          FINAL="data/daily/${DATE}_final.json"
          if [ -f "$FINAL" ]; then
            python -c "
          import json
          with open('$FINAL') as f: d=json.load(f)
          p = d.get('pitchers',[])
          c = sum(1 for x in p if x.get('lineup_confirmed'))
          s_grade = [x['pitcher'] for x in p if x.get('salci_grade')=='S']
          print(f'| Pitchers | {len(p)} |')
          print(f'| Confirmed lineups | {c} |')
          print(f'| S-Grade aces | {len(s_grade)}: {", ".join(s_grade)} |')
          " >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          else
            echo "⚠️ final.json not written (base missing or no games)" >> "$GITHUB_STEP_SUMMARY"
          fi
