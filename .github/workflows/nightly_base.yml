name: SALCI Nightly Base Build

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests numpy pandas scipy
          pip install pybaseball || echo "pybaseball install failed — Statcast skipped, proxy SALCI will be used"

      - name: Run nightly base builder
        run: python update_base_nightly.py

      - name: Commit and push daily_base.json
        run: |
          git config user.name  "SALCI Bot"
          git config user.email "salci-bot@users.noreply.github.com"
          git add daily_base.json
          git diff --staged --quiet || git commit -m "chore: nightly base build $(date -u +%Y-%m-%d)"
          git push
