name: SALCI Day-of Final Update

on:
  schedule:
    # Every 20 minutes from 3 PM ET (7 PM UTC) through 10 PM ET (2 AM UTC)
    - cron: '0,20,40 19 * * *'
    - cron: '0,20,40 20 * * *'
    - cron: '0,20,40 21 * * *'
    - cron: '0,20,40 22 * * *'
    - cron: '0,20,40 23 * * *'
    - cron: '0,20,40 0  * * *'
    - cron: '0,20,40 1  * * *'
    - cron: '0,20,40 2  * * *'
  workflow_dispatch:           # Manual trigger

jobs:
  update-final:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pybaseball scipy numpy pandas

      - name: Run day-of final updater
        run: python update_final_dayof.py

      - name: Commit and push daily_final.json
        run: |
          git config user.name  "SALCI Bot"
          git config user.email "salci-bot@users.noreply.github.com"
          git add daily_final.json
          git diff --staged --quiet || git commit -m "chore: day-of update $(date -u +'%H:%M UTC')"
          git push
