name: SALCI Day-of Final Update

on:
  schedule:
    - cron: '0,20,40 19 * * *'
    - cron: '0,20,40 20 * * *'
    - cron: '0,20,40 21 * * *'
    - cron: '0,20,40 22 * * *'
    - cron: '0,20,40 23 * * *'
    - cron: '0,20,40 0  * * *'
    - cron: '0,20,40 1  * * *'
    - cron: '0,20,40 2  * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-final:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests numpy pandas scipy
          pip install pybaseball || echo "pybaseball install failed — Statcast skipped, proxy SALCI will be used"

      - name: Check daily_base.json exists (self-heal if missing)
        run: |
          if [ ! -f daily_base.json ]; then
            echo "daily_base.json not found — running base builder first"
            python update_base_nightly.py
          else
            echo "daily_base.json found — proceeding to final update"
          fi

      - name: Run day-of final updater
        run: python update_final_dayof.py

      - name: Commit and push
        run: |
          git config user.name  "SALCI Bot"
          git config user.email "salci-bot@users.noreply.github.com"
          git add daily_base.json daily_final.json
          git diff --staged --quiet || git commit -m "chore: day-of update $(date -u +'%H:%M UTC')"
          git push
